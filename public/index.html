function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden')}

async function handleLogin(){
  const phone=document.getElementById('login-phone').value.trim();
  const pw=document.getElementById('login-password').value;
  const err=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(!/^1[3-9]\d{9}$/.test(phone)){err.textContent='璇疯緭鍏ユ湁鏁堢殑11浣嶆墜鏈哄彿鐮?;return}
  if(pw.length<6){err.textContent='瀵嗙爜鑷冲皯6浣?;return}
  if(!supabase){err.textContent='绯荤粺鏈厤缃甋upabase锛岃鑱旂郴绠＄悊鍛?;return}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>楠岃瘉涓?..';
  const email=phoneToEmail(phone);
  let{data,error}=await supabase.auth.signInWithPassword({email,password:pw});
  if(error&&error.message.includes('Invalid login credentials')){
    const{error:se}=await supabase.auth.signUp({email,password:pw});
    if(se){err.textContent='娉ㄥ唽澶辫触锛?+se.message;btn.disabled=false;btn.innerHTML='鐧诲綍';return}
    const{data:rd,error:re}=await supabase.auth.signInWithPassword({email,password:pw});
    if(re){err.textContent='鐧诲綍澶辫触锛?+re.message;btn.disabled=false;btn.innerHTML='鐧诲綍';return}
    data=rd;
  }else if(error){err.textContent='鐧诲綍澶辫触锛?+error.message;btn.disabled=false;btn.innerHTML='鐧诲綍';return}
  currentUser=data.user;
  if(!currentUser.user_metadata?.phone)await supabase.auth.updateUser({data:{phone}});
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app-container').classList.remove('hidden');
  document.getElementById('sidebar-phone').textContent=phone;
  loadData();
}

async function handleLogout(){
  if(supabase)await supabase.auth.signOut();
  currentUser=null;products=[];payments=[];
  document.getElementById('app-container').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('login-password').value='';
  document.getElementById('login-btn').innerHTML='鐧诲綍';
  document.getElementById('login-btn').disabled=false;
}

async function initSupabase(){
  if(!SUPABASE_URL.includes('YOUR_PROJECT_ID')){
    supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const{data:{session}}=await supabase.auth.getSession();
    if(session){currentUser=session.user;const phone=currentUser.user_metadata?.phone||'';document.getElementById('login-page').classList.add('hidden');document.getElementById('app-container').classList.remove('hidden');document.getElementById('sidebar-phone').textContent=phone;loadData()}
  }
}

async function loadData(){
  if(!supabase||!currentUser)return;
  showLoading('鍔犺浇鏁版嵁...');
  const{data:prods}=await supabase.from('products').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
  if(prods)products=prods;
  const{data:pays}=await supabase.from('payments').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
  if(pays)payments=pays;
  hideLoading();refresh();renderLedger();
}

function monthsToExpiry(p){const now=new Date();now.setHours(0,0,0,0);return(new Date(p.expiry_date||p.expiryDate)-now)/(86400000*30.44)}
function warnLevel(p){const m=monthsToExpiry(p);if(m<=3)return'red';if(m<=6)return'yellow';return'green'}
function dailySales(p){return(p.last_month_sales||p.lastMonthSales||0)/30}
function turnoverDays(p){const d=dailySales(p);return d>0?Math.round((p.stock||0)/d):Infinity}
function isSlow(p){return(p.stock||0)>0&&turnoverDays(p)>180}
function daysUntil(ds){const now=new Date();now.setHours(0,0,0,0);return Math.ceil((new Date(ds)-now)/86400000)}
function payStatus(p){if(p.paid)return'paid';return daysUntil(p.next_date||p.nextDate)<=7?'due':'upcoming'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

function renderStats(){
  const rC=products.filter(p=>warnLevel(p)==='red').length;
  const yC=products.filter(p=>warnLevel(p)==='yellow').length;
  const tS=products.reduce((s,p)=>s+(p.stock||0),0);
  const tL=products.reduce((s,p)=>s+(p.last_month_sales||p.lastMonthSales||0),0);
  const pD=payments.filter(p=>payStatus(p)==='due').length;
  const pT=payments.filter(p=>!p.paid).reduce((s,p)=>s+(p.amount||0),0);
  document.getElementById('stats-bar').innerHTML='<div class="stat-card"><div class="stat-label">鎬诲搧绉?/div><div class="stat-value">'+products.length+'</div></div><div class="stat-card"><div class="stat-label">鎬诲簱瀛?/div><div class="stat-value">'+tS.toLocaleString()+'</div><div class="stat-sub">鏈堥攢 '+tL.toLocaleString()+'</div></div><div class="stat-card red"><div class="stat-label">绾㈢伅</div><div class="stat-value">'+rC+'</div></div><div class="stat-card yellow"><div class="stat-label">榛勭伅</div><div class="stat-value">'+yC+'</div></div>'+(payments.length>0?'<div class="stat-card green"><div class="stat-label">寰呭洖娆?/div><div class="stat-value">'+(pT/10000).toFixed(1)+'涓?/div><div class="stat-sub">'+pD+'瀹跺埌鏈?/div></div>':'');
  const wb=document.getElementById('nav-warn-badge'),wt=rC+yC;
  if(wt>0){wb.textContent=wt;wb.classList.remove('hidden')}else{wb.classList.add('hidden')}
  const pb=document.getElementById('nav-pay-badge');
  if(pD>0){pb.textContent=pD;pb.classList.remove('hidden')}else{pb.classList.add('hidden')}
}

function renderLedger(){
  const s=(document.getElementById('search-ledger')?.value||'').toLowerCase();
  const fs=document.getElementById('filter-status')?.value||'all';
  let list=[...products];
  if(fs!=='all')list=list.filter(p=>warnLevel(p)===fs);
  if(s)list=list.filter(p=>(p.name||'').toLowerCase().includes(s));
  list.sort((a,b)=>{const o={red:0,yellow:1,green:2},da=o[warnLevel(a)],db=o[warnLevel(b)];return da!==db?da-db:new Date(a.expiry_date||a.expiryDate)-new Date(b.expiry_date||b.expiryDate)});
  const c=document.getElementById('ledger-content');
  if(!list.length){c.innerHTML='<div class="empty-state"><p>鏆傛棤鏁版嵁</p></div>';return}
  c.innerHTML='<table><thead><tr><th>鍝佺</th><th>鎵瑰彿</th><th>鏈夋晥鏈?/th><th>鍓╀綑</th><th>搴撳瓨</th><th>鏈堥攢</th><th>鏃ュ潎</th><th>鍛ㄨ浆澶?/th><th>鐘舵€?/th><th>鎿嶄綔</th></tr></thead><tbody>'+list.map(p=>{
    const lv=warnLevel(p),m=monthsToExpiry(p),ds=dailySales(p),to=turnoverDays(p),slow=isSlow(p);
    const st={red:'绾㈢伅',yellow:'榛勭伅',green:'姝ｅ父'}[lv];
    return'<tr><td><strong>'+esc(p.name||'')+'</strong></td><td><code>'+esc(p.batch||'')+'</code></td><td>'+fmtDate(p.expiry_date||p.expiryDate)+'</td><td>'+(m>0?m.toFixed(1)+'鏈?:'<span style="color:var(--red)">杩囨湡</span>')+'</td><td>'+(p.stock||0).toLocaleString()+'</td><td>'+(p.last_month_sales||p.lastMonthSales||0).toLocaleString()+'</td><td>'+ds.toFixed(1)+'</td><td>'+(to===Infinity?'-':to+'澶?)+(slow&&lv!=='green'?' <span style="color:var(--yellow);font-size:10px">鎱?/span>':'')+'</td><td><span class="badge badge-'+lv+'">'+st+'</span></td><td><div class="btn-group"><button class="btn btn-sm" onclick="openProductModal(\''+p.id+'\')">缂栬緫</button><button class="btn btn-sm btn-danger" onclick="deleteProduct(\''+p.id+'\')">鍒犻櫎</button></div></td></tr>';
  }).join('')+'</tbody></table>';
}

function renderWarnings(){
  const reds=products.filter(p=>warnLevel(p)==='red');
  const yels=products.filter(p=>warnLevel(p)==='yellow'&&isSlow(p));
  const c=document.getElementById('warnings-content');
  let h='<div class="warn-section"><div class="warn-section-title red">绾㈢伅 - 鏁堟湡3涓湀 ('+reds.length+'涓?</div><div class="warn-list">';
  if(!reds.length)h+='<div class="empty-state"><p>鏃犵孩鐏搧绉?/p></div>';
  else reds.forEach(p=>{h+='<div class="warn-item"><div class="warn-info"><span class="warn-name">'+esc(p.name||'')+'</span><span class="warn-meta">鎵瑰彿 '+esc(p.batch||'')+' 路 鏁堟湡 '+fmtDate(p.expiry_date||p.expiryDate)+' 路 搴撳瓨 '+(p.stock||0)+' 路 鍓?'+monthsToExpiry(p).toFixed(1)+'鏈?/span></div><div class="warn-action"><span class="badge badge-red">绔嬪嵆姹囨姤</span></div></div>'})
  h+='</div></div><div class="warn-section"><div class="warn-section-title yellow">榛勭伅 - 鏁堟湡3-6鏈?鍔ㄩ攢鎱?('+yels.length+'涓?</div><div class="warn-list">';
  if(!yels.length)h+='<div class="empty-state"><p>鏃犻粍鐏搧绉?/p></div>';
  else yels.forEach(p=>{h+='<div class="warn-item"><div class="warn-info"><span class="warn-name">'+esc(p.name||'')+'</span><span class="warn-meta">鎵瑰彿 '+esc(p.batch||'')+' 路 鏁堟湡 '+fmtDate(p.expiry_date||p.expiryDate)+' 路 搴撳瓨 '+(p.stock||0)+' 路 鏈堥攢 '+(p.last_month_sales||p.lastMonthSales||0)+'</span></div><div class="warn-action"><span class="badge badge-yellow">淇冮攢鎺ㄥ箍</span></div></div>'})
  h+='</div></div>';c.innerHTML=h;
}

function renderReport(){
  const now=new Date(),dt=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const tS=products.reduce((s,p)=>s+(p.stock||0),0),tL=products.reduce((s,p)=>s+(p.last_month_sales||p.lastMonthSales||0),0);
  const tR=tL>0?(tS/(tL/30)).toFixed(1):'-';
  const near=products.filter(p=>warnLevel(p)!=='green').sort((a,b)=>new Date(a.expiry_date||a.expiryDate)-new Date(b.expiry_date||b.expiryDate));
  const c=document.getElementById('report-content');
  let h='<div class="report-meta"><span>鏃ユ湡锛?strong>'+dt+'</strong></span><span>鍝佺锛?strong>'+products.length+'</strong></span><span>搴撳瓨锛?strong>'+tS.toLocaleString()+'</strong></span></div>';
  h+='<div class="report-section"><h3>閿€鍞儏鍐?/h3><table><thead><tr><th>鍝佺</th><th>鎵瑰彿</th><th>搴撳瓨</th><th>鏈堥攢</th><th>鏃ュ潎</th><th>鍛ㄨ浆澶?/th><th>鐘舵€?/th></tr></thead><tbody>';
  [...products].sort((a,b)=>(b.last_month_sales||b.lastMonthSales||0)-(a.last_month_sales||a.lastMonthSales||0)).forEach(p=>{const lv=warnLevel(p);h+='<tr><td>'+esc(p.name||'')+'</td><td>'+esc(p.batch||'')+'</td><td>'+(p.stock||0)+'</td><td>'+(p.last_month_sales||p.lastMonthSales||0)+'</td><td>'+dailySales(p).toFixed(1)+'</td><td>'+(turnoverDays(p)===Infinity?'-':turnoverDays(p))+'</td><td><span class="badge badge-'+lv+'">'+{red:'绾㈢伅',yellow:'榛勭伅',green:'姝ｅ父'}[lv]+'</span></td></tr>'});
  h+='</tbody></table></div><div class="report-section"><h3>鍛ㄨ浆姒傚喌</h3><p style="font-size:12px;color:var(--text2)">鍛ㄨ浆澶╂暟锛?strong>'+tR+'</strong> 路 鏈堥攢锛?strong>'+tL.toLocaleString()+'</strong> 路 搴撳瓨锛?strong>'+tS.toLocaleString()+'</strong></p></div>';
  h+='<div class="report-section"><h3>涓磋繎鏁堟湡</h3>';
  if(!near.length)h+='<p style="font-size:12px;color:var(--text3)">鏃犱复杩戞晥鏈熷搧绉?/p>';
  else{h+='<table><thead><tr><th>鍝佺</th><th>鎵瑰彿</th><th>鏁堟湡</th><th>鍓╂湀</th><th>搴撳瓨</th><th>绾у埆</th><th>鎺柦</th></tr></thead><tbody>';
    near.forEach(p=>{const lv=warnLevel(p);h+='<tr><td>'+esc(p.name||'')+'</td><td>'+esc(p.batch||'')+'</td><td>'+fmtDate(p.expiry_date||p.expiryDate)+'</td><td>'+monthsToExpiry(p).toFixed(1)+'鏈?/td><td>'+(p.stock||0)+'</td><td><span class="badge badge-'+lv+'">'+(lv==='red'?'绾㈢伅':'榛勭伅')+'</span></td><td>'+(lv==='red'?'绔嬪嵆姹囨姤':'淇冮攢鎺ㄥ箍')+'</td></tr>'})
    h+='</tbody></table>'}h+='</div>';c.innerHTML=h;
}

function renderPayments(){
  const s=(document.getElementById('search-payment')?.value||'').toLowerCase();
  const fs=document.getElementById('filter-pay-status')?.value||'all';
  let list=[...payments];
  if(fs!=='all')list=list.filter(p=>payStatus(p)===fs);
  if(s)list=list.filter(p=>(p.hospital||'').toLowerCase().includes(s));
  list.sort((a,b)=>{const o={due:0,upcoming:1,paid:2},sa=o[payStatus(a)],sb=o[payStatus(b)];return sa!==sb?sa-sb:new Date(a.next_date||a.nextDate)-new Date(b.next_date||b.nextDate)});
  const c=document.getElementById('payment-content');
  if(!list.length){c.innerHTML='<div class="empty-state"><p>鏆傛棤鍖婚櫌璁板綍</p></div>';return}
  c.innerHTML='<table><thead><tr><th>鍖婚櫌</th><th>鍛ㄦ湡</th><th>鍥炴鏃?/th><th>鍓╀綑</th><th>閲戦</th><th>鑱旂郴浜?/th><th>娴佺▼</th><th>鐘舵€?/th><th>鎿嶄綔</th></tr></thead><tbody>'+list.map(p=>{
    const st=payStatus(p),d=daysUntil(p.next_date||p.nextDate);
    const stT={due:'鍗冲皢鍒版湡',upcoming:'寰呭洖娆?,paid:'宸插洖娆?}[st];
    const stB=st==='due'?'badge-red':st==='paid'?'badge-green':'badge-yellow';
    const daysD=p.paid?'-':(d<=7?'<span style="color:var(--red);font-weight:700">'+d+'澶?/span>':d+'澶?);
    const tc=p.paid?'var(--yellow)':'var(--green)';
    return'<tr><td><strong>'+esc(p.hospital||'')+'</strong></td><td>'+esc(p.cycle||'')+'</td><td>'+fmtDate(p.next_date||p.nextDate)+'</td><td>'+daysD+'</td><td>'+((p.amount||0)).toLocaleString()+'</td><td>'+esc(p.contact||'')+'<br><span style="font-size:10px;color:var(--text3)">'+esc(p.role||'')+' '+esc(p.phone||'')+'</span></td><td><span style="font-size:11px;color:var(--text2)">'+esc(p.process||'-')+'</span></td><td><span class="badge '+stB+'">'+stT+'</span></td><td><div class="btn-group"><button class="btn btn-sm" onclick="openPaymentModal(\''+p.id+'\')">缂栬緫</button><button class="btn btn-sm" style="color:'+tc+'" onclick="togglePaid(\''+p.id+'\')">'+(p.paid?'u':'v')+'</button><button class="btn btn-sm btn-danger" onclick="deletePayment(\''+p.id+'\')">鍒犻櫎</button></div></td></tr>';
  }).join('')+'</tbody></table>';
}

function downloadCSV(headers,rows,filename){const csv='\uFEFF'+[headers,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename;a.click();toast('宸插鍑?)}

function fmtDate(ds){if(!ds)return'-';const d=new Date(ds);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function refresh(){renderStats();if(activeTab==='ledger')renderLedger();if(activeTab==='warnings')renderWarnings();if(activeTab==='report')renderReport();if(activeTab==='payment')renderPayments()}
function toast(msg){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000)}
