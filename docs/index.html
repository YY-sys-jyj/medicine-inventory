﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医药库存动销与回款管理系统</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--surface:#fff;--border:#e1e4e8;--text:#1a1d23;--text2:#6b7280;--text3:#9ca3af;--accent:#2563eb;--accent-bg:#eff6ff;--red:#dc2626;--red-bg:#fef2f2;--yellow:#d97706;--yellow-bg:#fffbeb;--green:#16a34a;--green-bg:#f0fdf4;--radius:6px;--shadow:0 1px 3px rgba(0,0,0,.06);--sidebar-w:210px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eff6ff 0%,#f0fdf4 50%,#fffbeb 100%)}
.login-page.hidden{display:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:36px 30px;width:380px;max-width:92vw;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-card h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-.01em}
.login-card .login-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:28px}
.login-card .form-group{margin-bottom:16px}
.login-card .form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.login-card .form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--text);transition:border-color .15s}
.login-card .form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s;margin-top:4px}
.login-btn:hover{background:#1d4ed8}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.6}
.app-container{display:flex;min-height:100vh}
.app-container.hidden{display:none}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-brand{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-brand h1{font-size:15px;font-weight:700;letter-spacing:-.01em}
.sidebar-brand .user-info{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px}
.sidebar-nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .12s}
.nav-item:hover{background:#f3f4f6;color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-item svg{width:17px;height:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;line-height:1.6}
.nav-badge.hidden{display:none}
.nav-item.admin-only{display:none}
.sidebar-footer{padding:10px;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:7px;width:100%;padding:8px 11px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;border:none;background:none;text-align:left;transition:all .12s}
.logout-btn:hover{background:#fef2f2;color:var(--red)}
.logout-btn svg{width:15px;height:15px}
.main{margin-left:var(--sidebar-w);flex:1;padding:22px 26px;min-width:0}
.trial-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #f59e0b;border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;font-size:12px;color:#92400e;display:flex;align-items:center;justify-content:space-between;gap:10px}
.trial-banner.hidden{display:none}
.trial-banner.expired{background:linear-gradient(135deg,#fee2e2,#fecaca);border-color:var(--red);color:#991b1b}
.trial-banner .trial-btn{padding:5px 12px;background:#f59e0b;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.trial-banner .trial-btn:hover{background:#d97706}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--text2);font-weight:500}
.stat-value{font-size:24px;font-weight:700;margin-top:3px;letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stat-card.red .stat-value{color:var(--red)}
.stat-card.yellow .stat-value{color:var(--yellow)}
.stat-card.green .stat-value{color:var(--green)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel.hidden{display:none}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.panel-head h2{font-size:14px;font-weight:600}
.panel-body{padding:16px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .12s;line-height:1.4;font-family:inherit}
.btn:hover{background:#f9fafb}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{color:var(--red);border-color:#fecaca}
.btn-danger:hover{background:var(--red-bg)}
.btn-warn{color:#92400e;border-color:#fde68a;background:#fffbeb}
.btn-warn:hover{background:#fef3c7}
.btn-sm{padding:4px 9px;font-size:11px}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-group{display:flex;gap:6px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 10px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text2);border-bottom:2px solid var(--border);background:#fafbfc;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#fafbfc}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-green{background:var(--green-bg);color:var(--green)}
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.search-input,.filter-select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:inherit;color:var(--text);background:var(--surface)}
.search-input{width:200px}
.search-input:focus,.filter-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
.modal-overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:8px;width:460px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,.15);animation:slideUp .18s}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;padding:3px;border-radius:4px;color:var(--text3);line-height:1;font-size:16px}
.modal-close:hover{background:#f3f4f6;color:var(--text)}
.modal-body{padding:18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:12px}
.form-group:last-child{margin-bottom:0}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.form-input,.form-textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;color:var(--text);transition:border-color .15s}
.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.warn-section{margin-bottom:18px}
.warn-section:last-child{margin-bottom:0}
.warn-section-title{font-size:13px;font-weight:600;padding:10px 14px;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;gap:7px}
.warn-section-title.red{background:var(--red-bg);color:var(--red)}
.warn-section-title.yellow{background:var(--yellow-bg);color:var(--yellow)}
.warn-list{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius)}
.warn-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
.warn-item:last-child{border-bottom:none}
.warn-item:hover{background:#fafbfc}
.warn-info{display:flex;flex-direction:column;gap:2px}
.warn-name{font-weight:600;font-size:13px}
.warn-meta{font-size:11px;color:var(--text2)}
.warn-action{flex-shrink:0}
.report-section{margin-bottom:22px}
.report-section:last-child{margin-bottom:0}
.report-section h3{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.report-meta{display:flex;gap:18px;margin-bottom:14px;font-size:12px;color:var(--text2)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:9px 16px;border-radius:var(--radius);font-size:13px;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.empty-state{text-align:center;padding:36px 20px;color:var(--text3)}
.empty-state p{font-size:12px}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;font-size:14px;color:var(--text2)}
.loading-overlay.hidden{display:none}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.admin-section{margin-bottom:24px}
.admin-section h3{font-size:13px;font-weight:600;margin-bottom:10px}
@media print{.sidebar,.btn,.modal-overlay,.filter-bar,.stats-bar{display:none!important}.main{margin-left:0;padding:0}.panel{box-shadow:none;border:none}}
</style>

</head>
<body>
<div class="loading-overlay" id="loading-overlay"><div class="loading-spinner"></div><span id="loading-text">正在加载系统...</span></div>
<div id="debug-status" style="position:fixed;top:0;left:0;right:0;background:#1a1d23;color:#fff;padding:4px 12px;font-size:11px;z-index:9999;font-family:monospace;text-align:center"></div>
<div class="login-page" id="login-page">
  <div class="login-card">
    <h1>医药库存动销管理</h1><p class="login-sub">效期预警 & 回款管理系统</p>
    <div class="form-group"><label class="form-label">手机号 / 邮箱</label><input class="form-input" type="text" id="login-phone" placeholder="手机号或邮箱" autocomplete="username"></div>
    <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" id="login-password" placeholder="设置/输入密码（至少6位）" minlength="6" autocomplete="new-password"></div>
    <button class="login-btn" id="login-btn" onclick="handleLogin()">登 录</button>
    <div class="login-error" id="login-error"></div>
    <p class="login-hint">首次登录将自动注册账号<br>手机号或邮箱作为唯一身份标识</p>
    <p style="font-size:10px;color:#9ca3af;margin-top:8px">Created by YY-sys-jyj</p>
  </div>
</div>
<div class="app-container hidden" id="app-container">
  <aside class="sidebar">
    <div class="sidebar-brand"><h1>医药库存动销</h1><div class="user-info"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span id="sidebar-phone"></span></div></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="ledger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>数据台账</button>
      <button class="nav-item" data-tab="warnings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>预警看板<span class="nav-badge hidden" id="nav-warn-badge">0</span></button>
      <button class="nav-item" data-tab="report"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>库存动销报告</button>
      <button class="nav-item" data-tab="payment"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>回款管理<span class="nav-badge hidden" id="nav-pay-badge">0</span></button>
      <button class="nav-item admin-only" data-tab="admin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>系统管理</button>
    </nav>
    <div class="sidebar-footer"><div id="sidebar-status" style="padding:6px 11px;font-size:11px;color:var(--text2);line-height:1.5;display:none"></div><button class="logout-btn" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录</button><div style="font-size:10px;color:var(--text3);padding:4px 11px 0">by YY-sys-jyj</div></div>
  </aside>
  <main class="main">
    <div class="trial-banner hidden" id="trial-banner"><span id="trial-text"></span><button class="trial-btn hidden" id="trial-btn" onclick="handlePayment()">立即续费 ¥2/月</button></div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="panel" id="panel-ledger"><div class="panel-head"><h2>品种库存台账</h2><div class="btn-group"><button class="btn btn-sm" onclick="seedDemoData()">演示数据</button><button class="btn btn-primary btn-sm" onclick="openProductModal()">+ 新增品种</button></div></div><div class="panel-body"><div class="filter-bar"><input class="search-input" placeholder="搜索品种名称..." id="search-ledger" oninput="renderLedger()"><select class="filter-select" id="filter-status" onchange="renderLedger()"><option value="all">全部状态</option><option value="red">🔴 红灯预警</option><option value="yellow">🟡 黄灯预警</option><option value="green">🟢 正常</option></select></div><div id="ledger-content"></div></div></div>
    <div class="panel hidden" id="panel-warnings"><div class="panel-head"><h2>效期预警看板</h2><button class="btn btn-sm" onclick="exportWarningsCSV()">导出清单</button></div><div class="panel-body" id="warnings-content"></div></div>
    <div class="panel hidden" id="panel-report"><div class="panel-head"><h2>库存动销报告</h2><div class="btn-group"><button class="btn btn-sm" onclick="window.print()">打印</button><button class="btn btn-sm" onclick="exportReportCSV()">导出CSV</button></div></div><div class="panel-body" id="report-content"></div></div>
    <div class="panel hidden" id="panel-payment"><div class="panel-head"><h2>医院回款台账</h2><button class="btn btn-primary btn-sm" onclick="openPaymentModal()">+ 新增医院</button></div><div class="panel-body"><div class="filter-bar"><input class="search-input" placeholder="搜索医院名称..." id="search-payment" oninput="renderPayments()"><select class="filter-select" id="filter-pay-status" onchange="renderPayments()"><option value="all">全部状态</option><option value="due">⚠ 即将到期</option><option value="upcoming">待回款</option><option value="paid">已回款</option></select></div><div id="payment-content"></div></div></div>
    <div class="panel hidden" id="panel-admin"><div class="panel-head"><h2>系统管理</h2></div><div class="panel-body" id="admin-content"></div></div>
  </main>
</div>
<div class="modal-overlay hidden" id="product-modal-overlay"><div class="modal"><div class="modal-head"><h3 id="product-modal-title">新增品种</h3><button class="modal-close" onclick="closeProductModal()">✕</button></div><div class="modal-body"><div class="form-group"><label class="form-label">品种名称</label><input class="form-input" id="f-name" placeholder="阿莫西林胶囊"></div><div class="form-group"><label class="form-label">批号</label><input class="form-input" id="f-batch" placeholder="20250601A"></div><div class="form-row"><div class="form-group"><label class="form-label">有效期至</label><input class="form-input" type="date" id="f-expiry"></div><div class="form-group"><label class="form-label">库存量</label><input class="form-input" type="number" id="f-stock" min="0" placeholder="0"></div></div><div class="form-group"><label class="form-label">最近一个月销量</label><input class="form-input" type="number" id="f-sales" min="0" placeholder="0"></div><input type="hidden" id="f-id"></div><div class="modal-foot"><button class="btn" onclick="closeProductModal()">取消</button><button class="btn btn-primary" onclick="saveProduct()">保存</button></div></div></div>
<div class="modal-overlay hidden" id="payment-modal-overlay"><div class="modal"><div class="modal-head"><h3 id="payment-modal-title">新增医院</h3><button class="modal-close" onclick="closePaymentModal()">✕</button></div><div class="modal-body"><div class="form-group"><label class="form-label">医院名称</label><input class="form-input" id="fp-hospital" placeholder="XX市人民医院"></div><div class="form-row"><div class="form-group"><label class="form-label">付款周期</label><select class="form-input" id="fp-cycle"><option value="每月">每月</option><option value="每季度" selected>每季度</option><option value="每半年">每半年</option><option value="每年">每年</option><option value="不定期">不定期</option></select></div><div class="form-group"><label class="form-label">下次回款日期</label><input class="form-input" type="date" id="fp-date"></div></div><div class="form-group"><label class="form-label">预计回款金额</label><input class="form-input" type="number" id="fp-amount" min="0" placeholder="0"></div><div class="form-group"><label class="form-label">付款流程说明</label><textarea class="form-textarea" id="fp-process" placeholder="药剂科提交→院长审批→财务付款"></textarea></div><div class="form-row"><div class="form-group"><label class="form-label">关键联系人</label><input class="form-input" id="fp-contact" placeholder="姓名"></div><div class="form-group"><label class="form-label">职务</label><input class="form-input" id="fp-role" placeholder="采购办主任"></div></div><div class="form-group"><label class="form-label">联系电话</label><input class="form-input" id="fp-phone" placeholder="手机或座机"></div><div class="form-group"><label class="form-label">备注</label><input class="form-input" id="fp-notes" placeholder="其他信息"></div><input type="hidden" id="fp-id"></div><div class="modal-foot"><button class="btn" onclick="closePaymentModal()">取消</button><button class="btn btn-primary" onclick="savePayment()">保存</button></div></div></div>

<script>
(function(){var d=document.getElementById("debug-status");if(d){d.textContent="window.supabase="+(typeof window.supabase)+"  supabase="+(typeof supabaseClient)+"  URL="+window.location.href;}})();
var SUPER_ADMIN_PHONE='18089502376';
// Supabase loaded via static script tag in <head>
var SUPABASE_URL='https://lrvsblbnyismfmithqse.supabase.co';
var SUPABASE_KEY='sb_publishable_q77hKcjxNOa6BYQy48ilqw_t46FPDJ4';
var supabaseClient=null,currentUser=null,userRole=null,products=[],payments=[],activeTab='ledger';
function phoneToEmail(p){if(p.indexOf('@')>=0)return p.trim();return'user_'+p.replace(/\D/g,'')+'@rx.user'}
function showLoading(m){document.getElementById('loading-text').textContent=m||'...';document.getElementById('loading-overlay').classList.remove('hidden')}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden')}
function initApp(){
  var d=document.getElementById("debug-status");
  if(!window.supabase){if(d)d.textContent="initApp: window.supabase MISSING";document.getElementById('login-error').textContent='⚠ 组件加载失败，请刷新页面重试';document.getElementById('login-btn').disabled=false;document.getElementById('login-btn').innerHTML='登 录';return;}
  if(d)d.textContent="initApp: creating client...";
  try{
    supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    if(d)d.textContent="initApp: client created, supabase="+(typeof supabaseClient)+" auth="+!!(supabaseClient&&supabaseClient.auth);
  }catch(e){if(d)d.textContent="initApp ERROR: "+e.message;document.getElementById('login-error').textContent='⚠ 初始化失败：'+e.message;document.getElementById('login-btn').disabled=false;document.getElementById('login-btn').innerHTML='登 录';return;}
  document.getElementById("login-btn").disabled=false;document.getElementById("login-btn").innerHTML="登 录";supabaseClient.auth.getSession().then(function(r){
    if(r.data&&r.data.session&&r.data.session.user){
      currentUser=r.data.session.user;
      checkUserRole().then(function(){var ph=currentUser.user_metadata?currentUser.user_metadata.phone||'':'';enterApp(ph)});
    }else{hideLoading();}
  }).catch(function(e){hideLoading();});
}
async function checkUserRole(){
  if(!supabaseClient||!currentUser)return;
  var phone=(currentUser.user_metadata&&currentUser.user_metadata.phone)||'';
  if(phone===SUPER_ADMIN_PHONE){
    var r=await supabaseClient.from('user_roles').select('*').eq('user_id',currentUser.id).maybeSingle();
    if(!r.data)await supabaseClient.from('user_roles').insert({user_id:currentUser.id,role:'super_admin',admin_level:1});
    else if(r.data.role!=='super_admin')await supabaseClient.from('user_roles').update({role:'super_admin',admin_level:1}).eq('user_id',currentUser.id);
    userRole='super_admin';return;
  }
  var r=await supabaseClient.from('user_roles').select('*').eq('user_id',currentUser.id).maybeSingle();
  if(r.data){userRole=r.data.role;return}
  var trialEnds=new Date(Date.now()+24*60*60*1000).toISOString();
  await supabaseClient.from('user_roles').insert({user_id:currentUser.id,role:'user',trial_ends_at:trialEnds});
  userRole='user';
}
function enterApp(phone){
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app-container').classList.remove('hidden');
  document.getElementById('sidebar-phone').textContent=phone;
  if(userRole==='super_admin'||userRole==='admin'){
    var items=document.querySelectorAll('.admin-only');for(var i=0;i<items.length;i++)items[i].style.display='flex';
  }
  updateTrialBanner();loadData();
}
async function updateTrialBanner(){
  var banner=document.getElementById('trial-banner'),text=document.getElementById('trial-text'),btn=document.getElementById('trial-btn');
  var sidebarStatus=document.getElementById('sidebar-status');
  if(!userRole||userRole==='super_admin'||userRole==='admin'){
    banner.classList.add('hidden');
    if(sidebarStatus)sidebarStatus.style.display='none';
    return;
  }
  var r=await supabaseClient.from('user_roles').select('trial_ends_at,paid_until').eq('user_id',currentUser.id).single();
  if(!r.data){banner.classList.add('hidden');if(sidebarStatus)sidebarStatus.style.display='none';return}
  var now=new Date(),paidUntil=r.data.paid_until?new Date(r.data.paid_until):null;
  if(paidUntil&&paidUntil>now){
    var days=Math.ceil((paidUntil-now)/86400000);
    text.textContent='已付费 · 剩余 '+days+' 天';
    banner.className='trial-banner';banner.classList.remove('hidden');btn.classList.add('hidden');
    if(sidebarStatus){sidebarStatus.style.display='block';sidebarStatus.innerHTML='<span style="color:var(--green)">✅ 已付费</span><br>剩余 <b>'+days+'</b> 天 · ¥2/月';}
    return;
  }
  var trialEnds=r.data.trial_ends_at?new Date(r.data.trial_ends_at):null;
  if(!trialEnds){banner.classList.add('hidden');if(sidebarStatus)sidebarStatus.style.display='none';return}
  if(now<trialEnds){
    var hours=Math.ceil((trialEnds-now)/3600000);
    text.textContent='免费试用中 · 剩余 '+hours+' 小时 · 试用结束后需付费 ¥2/月继续使用';
    banner.className='trial-banner';banner.classList.remove('hidden');btn.classList.add('hidden');
    if(sidebarStatus){sidebarStatus.style.display='block';sidebarStatus.innerHTML='<span style="color:var(--yellow)">🕐 免费试用中</span><br>剩余 <b>'+hours+'</b> 小时<br><span style="font-size:10px;color:var(--text3)">试用结束后需付费 ¥2/月</span>';}
    return;
  }
  text.textContent='试用已到期 · 付费 ¥2/月即可继续使用 · 数据不会丢失';
  banner.className='trial-banner expired';banner.classList.remove('hidden');btn.classList.remove('hidden');
  if(sidebarStatus){sidebarStatus.style.display='block';sidebarStatus.innerHTML='<span style="color:var(--red)">🔴 试用已到期</span><br><span style="font-size:10px">付费 ¥2/月即可继续使用<br>数据不会丢失</span>';}
}
function handlePayment(){
  if(!confirm('确认续费 ¥2/月？\n\n（演示模式：点击确认即完成续费）'))return;
  showLoading('处理中...');var paidUntil=new Date(Date.now()+30*24*60*60*1000).toISOString();
  supabaseClient.from('user_roles').update({paid_until:paidUntil}).eq('user_id',currentUser.id).then(function(){updateTrialBanner();hideLoading();toast('续费成功！有效期延长30天')});
}
async function handleLogin(){
  var phone=document.getElementById('login-phone').value.trim(),pw=document.getElementById('login-password').value;
  var err=document.getElementById('login-error'),btn=document.getElementById('login-btn');err.textContent='';
  var isEmail=phone.indexOf('@')>=0;
  if(!isEmail&&!/^1[3-9]\d{9}$/.test(phone)){err.textContent='手机号格式不正确';return}
  if(isEmail&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(phone)){err.textContent='邮箱格式不正确';return}
  if(pw.length<6){err.textContent='密码至少6位';return}
  if(!supabaseClient){err.textContent='正在连接服务器';return}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>验证中...';
  var email=phoneToEmail(phone),result=await supabaseClient.auth.signInWithPassword({email:email,password:pw});
  if(result.error&&result.error.message.indexOf('Invalid login credentials')>=0){
    result=await supabaseClient.auth.signUp({email:email,password:pw});
    if(result.error){err.textContent='注册失败：'+result.error.message;btn.disabled=false;btn.innerHTML='登 录';return}
    result=await supabaseClient.auth.signInWithPassword({email:email,password:pw});
    if(result.error){err.textContent='登录失败：'+result.error.message;btn.disabled=false;btn.innerHTML='登 录';return}
  }else if(result.error){err.textContent='登录失败：'+result.error.message;btn.disabled=false;btn.innerHTML='登 录';return}
  currentUser=result.data.user;
  if(!currentUser.user_metadata||!currentUser.user_metadata.phone)await supabaseClient.auth.updateUser({data:{phone:phone}});
  await checkUserRole();enterApp(phone);
}
async function handleLogout(){
  if(supabaseClient)await supabaseClient.auth.signOut();
  currentUser=null;userRole=null;products=[];payments=[];
  document.getElementById('app-container').classList.add('hidden');document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('login-password').value='';document.getElementById('login-btn').innerHTML='登 录';document.getElementById('login-btn').disabled=false;
  var items=document.querySelectorAll('.admin-only');for(var i=0;i<items.length;i++)items[i].style.display='none';
}
async function loadData(){
  if(!supabaseClient||!currentUser)return;
  if(userRole==='user'){var ok=await checkAccess();if(!ok)return}
  showLoading('加载数据...');
  var r1=await supabaseClient.from('products').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});if(r1.data)products=r1.data;
  var r2=await supabaseClient.from('payments').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});if(r2.data)payments=r2.data;
  hideLoading();refresh();renderLedger();
}
async function checkAccess(){
  updateTrialBanner();var r=await supabaseClient.from('user_roles').select('trial_ends_at,paid_until').eq('user_id',currentUser.id).single();
  if(!r.data)return true;var now=new Date();
  if(r.data.paid_until&&new Date(r.data.paid_until)>now)return true;
  if(r.data.trial_ends_at&&new Date(r.data.trial_ends_at)>now)return true;
  document.getElementById('stats-bar').innerHTML='';document.getElementById('ledger-content').innerHTML='<div class="empty-state"><p>试用已到期</p><p style="margin-top:8px">付费 ¥2/月 即可继续使用全部功能</p></div>';
  return false;
}
function monthsToExpiry(p){var n=new Date();n.setHours(0,0,0,0);return(new Date(p.expiry_date||p.expiryDate)-n)/2678400000}
function warnLevel(p){var m=monthsToExpiry(p);if(m<=3)return'red';if(m<=6)return'yellow';return'green'}
function dailySales(p){return(p.last_month_sales||p.lastMonthSales||0)/30}
function turnoverDays(p){var d=dailySales(p);return d>0?Math.round((p.stock||0)/d):Infinity}
function isSlow(p){return(p.stock||0)>0&&turnoverDays(p)>180}
function daysUntil(ds){var n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(ds)-n)/86400000)}
function payStatus(p){if(p.paid)return'paid';return daysUntil(p.next_date||p.nextDate)<=7?'due':'upcoming'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function renderStats(){
  var rC=products.filter(function(p){return warnLevel(p)==='red'}).length,yC=products.filter(function(p){return warnLevel(p)==='yellow'}).length;
  var tS=products.reduce(function(s,p){return s+(p.stock||0)},0),tL=products.reduce(function(s,p){return s+(p.last_month_sales||p.lastMonthSales||0)},0);
  var pD=payments.filter(function(p){return payStatus(p)==='due'}).length,pT=payments.filter(function(p){return!p.paid}).reduce(function(s,p){return s+(p.amount||0)},0);
  document.getElementById('stats-bar').innerHTML='<div class="stat-card"><div class="stat-label">品种总数</div><div class="stat-value">'+products.length+'</div></div><div class="stat-card"><div class="stat-label">总库存</div><div class="stat-value">'+tS.toLocaleString()+'</div><div class="stat-sub">月销 '+tL.toLocaleString()+'</div></div><div class="stat-card red"><div class="stat-label">红灯预警</div><div class="stat-value">'+rC+'</div></div><div class="stat-card yellow"><div class="stat-label">黄灯预警</div><div class="stat-value">'+yC+'</div></div>'+(payments.length>0?'<div class="stat-card green"><div class="stat-label">待回款</div><div class="stat-value">'+(pT/10000).toFixed(1)+'万</div><div class="stat-sub">'+pD+'家到期</div></div>':'');
  var wb=document.getElementById('nav-warn-badge'),wt=rC+yC;if(wt>0){wb.textContent=wt;wb.classList.remove('hidden')}else{wb.classList.add('hidden')}
  var pb=document.getElementById('nav-pay-badge');if(pD>0){pb.textContent=pD;pb.classList.remove('hidden')}else{pb.classList.add('hidden')}
}
function renderLedger(){
  var s=(document.getElementById('search-ledger')?document.getElementById('search-ledger').value:'').toLowerCase();
  var fs=(document.getElementById('filter-status')?document.getElementById('filter-status').value:'all');
  var list=products.slice();if(fs!=='all')list=list.filter(function(p){return warnLevel(p)===fs});
  if(s)list=list.filter(function(p){return(p.name||'').toLowerCase().indexOf(s)>=0});
  list.sort(function(a,b){var o={red:0,yellow:1,green:2},da=o[warnLevel(a)],db=o[warnLevel(b)];return da!==db?da-db:new Date(a.expiry_date||a.expiryDate)-new Date(b.expiry_date||b.expiryDate)});
  var c=document.getElementById('ledger-content');
  if(!list.length){c.innerHTML='<div class="empty-state"><p>暂无数据</p></div>';return}
  c.innerHTML='<table><thead><tr><th>品种</th><th>批号</th><th>有效期</th><th>剩余</th><th>库存</th><th>月销</th><th>日均</th><th>周转天</th><th>状态</th><th>操作</th></tr></thead><tbody>'+list.map(function(p){
    var lv=warnLevel(p),m=monthsToExpiry(p),ds=dailySales(p),to=turnoverDays(p),slow=isSlow(p),st={red:'红灯',yellow:'黄灯',green:'正常'}[lv];
    return'<tr><td><strong>'+esc(p.name||'')+'</strong></td><td><code>'+esc(p.batch||'')+'</code></td><td>'+fmtDate(p.expiry_date||p.expiryDate)+'</td><td>'+(m>0?m.toFixed(1)+'月':'<span style="color:var(--red)">过期</span>')+'</td><td>'+(p.stock||0).toLocaleString()+'</td><td>'+(p.last_month_sales||p.lastMonthSales||0).toLocaleString()+'</td><td>'+ds.toFixed(1)+'</td><td>'+(to===Infinity?'-':to+'天')+(slow&&lv!=='green'?' <span style="color:var(--yellow);font-size:10px">慢</span>':'')+'</td><td><span class="badge badge-'+lv+'">'+st+'</span></td><td><div class="btn-group"><button class="btn btn-sm" onclick="openProductModal(\''+p.id+'\')">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteProduct(\''+p.id+'\')">删除</button></div></td></tr>';
  }).join('')+'</tbody></table>';
}
function renderWarnings(){
  var reds=products.filter(function(p){return warnLevel(p)==='red'}),yels=products.filter(function(p){return warnLevel(p)==='yellow'&&isSlow(p)}),c=document.getElementById('warnings-content'),h='';
  h+='<div class="warn-section"><div class="warn-section-title red">🔴 红灯预警 - 效期3个月 ('+reds.length+'个)</div><div class="warn-list">';
  if(!reds.length)h+='<div class="empty-state"><p>暂无红灯预警</p></div>';
  else reds.forEach(function(p){h+='<div class="warn-item"><div class="warn-info"><span class="warn-name">'+esc(p.name||'')+'</span><span class="warn-meta">批号 '+esc(p.batch||'')+' / 效期 '+fmtDate(p.expiry_date||p.expiryDate)+' / 库存 '+(p.stock||0)+' / 剩 '+monthsToExpiry(p).toFixed(1)+'月</span></div><div class="warn-action"><span class="badge badge-red">立即汇报 · 优先使用</span></div></div>'});
  h+='</div></div><div class="warn-section"><div class="warn-section-title yellow">🟡 黄灯预警 - 效期3-6月+动销慢 ('+yels.length+'个)</div><div class="warn-list">';
  if(!yels.length)h+='<div class="empty-state"><p>暂无黄灯预警</p></div>';
  else yels.forEach(function(p){h+='<div class="warn-item"><div class="warn-info"><span class="warn-name">'+esc(p.name||'')+'</span><span class="warn-meta">批号 '+esc(p.batch||'')+' / 效期 '+fmtDate(p.expiry_date||p.expiryDate)+' / 库存 '+(p.stock||0)+' / 月销 '+(p.last_month_sales||p.lastMonthSales||0)+'</span></div><div class="warn-action"><span class="badge badge-yellow">建议促销推广</span></div></div>'});
  h+='</div></div>';c.innerHTML=h;
}
function renderReport(){
  var n=new Date(),dt=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  var tS=products.reduce(function(s,p){return s+(p.stock||0)},0),tL=products.reduce(function(s,p){return s+(p.last_month_sales||p.lastMonthSales||0)},0),tR=tL>0?(tS/(tL/30)).toFixed(1):'-';
  var near=products.filter(function(p){return warnLevel(p)!=='green'}).sort(function(a,b){return new Date(a.expiry_date||a.expiryDate)-new Date(b.expiry_date||b.expiryDate)});
  var c=document.getElementById('report-content'),h='<div class="report-meta"><span>日期：<strong>'+dt+'</strong></span><span>品种：<strong>'+products.length+'</strong></span><span>库存：<strong>'+tS.toLocaleString()+'</strong></span></div>';
  h+='<div class="report-section"><h3>一、各品种销售情况</h3><table><thead><tr><th>品种</th><th>批号</th><th>库存</th><th>月销</th><th>日均</th><th>周转天</th><th>状态</th></tr></thead><tbody>';
  products.slice().sort(function(a,b){return(b.last_month_sales||b.lastMonthSales||0)-(a.last_month_sales||a.lastMonthSales||0)}).forEach(function(p){
    var lv=warnLevel(p);h+='<tr><td>'+esc(p.name||'')+'</td><td>'+esc(p.batch||'')+'</td><td>'+(p.stock||0)+'</td><td>'+(p.last_month_sales||p.lastMonthSales||0)+'</td><td>'+dailySales(p).toFixed(1)+'</td><td>'+(turnoverDays(p)===Infinity?'-':turnoverDays(p))+'</td><td><span class="badge badge-'+lv+'">'+{red:'红灯',yellow:'黄灯',green:'正常'}[lv]+'</span></td></tr>';
  });
  h+='</tbody></table></div><div class="report-section"><h3>二、库存周转概况</h3><p style="font-size:12px;color:var(--text2)">整体周转天数：<strong>'+tR+'</strong> · 月销：<strong>'+tL.toLocaleString()+'</strong> · 库存：<strong>'+tS.toLocaleString()+'</strong></p></div>';
  h+='<div class="report-section"><h3>三、临近效期品种</h3>';
  if(!near.length)h+='<p style="font-size:12px;color:var(--text3)">当前无临近效期品种</p>';

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function refresh(){renderStats();if(activeTab==='ledger')renderLedger();if(activeTab==='warnings')renderWarnings();if(activeTab==='report')renderReport();if(activeTab==='payment')renderPayments()}
